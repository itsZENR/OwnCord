name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build & Release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Client/tauri-client/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: Client/tauri-client/src-tauri

      - name: Extract version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build server (Windows)
        shell: bash
        run: cd Server && go build -o chatserver.exe -ldflags "-s -w -X main.version=$VERSION" .

      - name: Build server (Linux amd64)
        shell: bash
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: cd Server && go build -o ../chatserver-linux-amd64 -ldflags "-s -w -X main.version=$VERSION" .

      - name: Download LiveKit server (Windows)
        shell: pwsh
        env:
          LIVEKIT_VERSION: "1.11.0"
        run: |
          $ver = $env:LIVEKIT_VERSION
          $url = "https://github.com/livekit/livekit/releases/download/v$ver/livekit_${ver}_windows_amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile livekit.zip
          Expand-Archive -Path livekit.zip -DestinationPath livekit-extract -Force
          $exe = Get-ChildItem -Path livekit-extract -Filter livekit-server.exe -Recurse | Select-Object -First 1
          if (-not $exe) { throw "livekit-server.exe not found in archive" }
          Copy-Item $exe.FullName -Destination livekit-server.exe -Force

      - name: Download LiveKit server (Linux amd64)
        shell: pwsh
        env:
          LIVEKIT_VERSION: "1.11.0"
        run: |
          $ver = $env:LIVEKIT_VERSION
          $url = "https://github.com/livekit/livekit/releases/download/v$ver/livekit_${ver}_linux_amd64.tar.gz"
          Invoke-WebRequest -Uri $url -OutFile livekit-linux.tar.gz
          New-Item -ItemType Directory -Path livekit-linux-extract -Force | Out-Null
          tar -xzf livekit-linux.tar.gz -C livekit-linux-extract
          $bin = Get-ChildItem -Path livekit-linux-extract -Filter livekit-server -Recurse | Where-Object { -not $_.PSIsContainer } | Select-Object -First 1
          if (-not $bin) { throw "livekit-server (linux) not found in archive" }
          Copy-Item $bin.FullName -Destination livekit-server-linux-amd64 -Force

      - name: Install npm dependencies
        working-directory: Client/tauri-client
        run: npm ci

      - name: Build Tauri app
        working-directory: Client/tauri-client
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Locate artifacts
        id: artifacts
        shell: bash
        run: |
          NSIS_DIR="Client/tauri-client/src-tauri/target/release/bundle/nsis"
          INSTALLER=$(find "$NSIS_DIR" -name "*.exe" | head -1)
          echo "installer_path=$INSTALLER" >> "$GITHUB_OUTPUT"
          echo "installer_name=$(basename $INSTALLER)" >> "$GITHUB_OUTPUT"
          # Updater artifacts (produced when TAURI_SIGNING_PRIVATE_KEY is set)
          NSIS_ZIP=$(find "$NSIS_DIR" -name "*_x64-setup.nsis.zip" ! -name "*.sig" | head -1)
          NSIS_SIG=$(find "$NSIS_DIR" -name "*_x64-setup.nsis.zip.sig" | head -1)
          echo "nsis_zip=${NSIS_ZIP:-}" >> "$GITHUB_OUTPUT"
          echo "nsis_sig=${NSIS_SIG:-}" >> "$GITHUB_OUTPUT"

      - name: Generate SHA256 checksums
        shell: pwsh
        run: |
          $lines = @()
          $serverHash = (Get-FileHash -Path Server/chatserver.exe -Algorithm SHA256).Hash.ToLower()
          $lines += "$serverHash  chatserver.exe"
          $livekitHash = (Get-FileHash -Path livekit-server.exe -Algorithm SHA256).Hash.ToLower()
          $lines += "$livekitHash  livekit-server.exe"
          $serverLinuxHash = (Get-FileHash -Path chatserver-linux-amd64 -Algorithm SHA256).Hash.ToLower()
          $lines += "$serverLinuxHash  chatserver-linux-amd64"
          $livekitLinuxHash = (Get-FileHash -Path livekit-server-linux-amd64 -Algorithm SHA256).Hash.ToLower()
          $lines += "$livekitLinuxHash  livekit-server-linux-amd64"
          $installerPath = "${{ steps.artifacts.outputs.installer_path }}"
          $installerName = "${{ steps.artifacts.outputs.installer_name }}"
          $clientHash = (Get-FileHash -Path $installerPath -Algorithm SHA256).Hash.ToLower()
          $lines += "$clientHash  $installerName"
          $nsisZip = "${{ steps.artifacts.outputs.nsis_zip }}"
          if ($nsisZip -and (Test-Path $nsisZip)) {
            $zipName = Split-Path $nsisZip -Leaf
            $zipHash = (Get-FileHash -Path $nsisZip -Algorithm SHA256).Hash.ToLower()
            $lines += "$zipHash  $zipName"
          }
          $lines -join "`n" | Out-File -FilePath checksums.sha256 -Encoding utf8 -NoNewline

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          ASSETS=(
            Server/chatserver.exe
            livekit-server.exe
            chatserver-linux-amd64
            livekit-server-linux-amd64
            "${{ steps.artifacts.outputs.installer_path }}"
            checksums.sha256
          )
          # Include updater artifacts if signing key was available
          if [ -n "${{ steps.artifacts.outputs.nsis_zip }}" ]; then
            ASSETS+=("${{ steps.artifacts.outputs.nsis_zip }}")
          fi
          if [ -n "${{ steps.artifacts.outputs.nsis_sig }}" ]; then
            ASSETS+=("${{ steps.artifacts.outputs.nsis_sig }}")
          fi
          gh release create ${{ github.ref_name }} \
            --generate-notes \
            "${ASSETS[@]}"
